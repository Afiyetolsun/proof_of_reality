identifier = "com.example.apps.scan-and-sign"
app_version = "0.2.0"

prepare_container = [
    { type = "RUN", command = "apt-get update" },
    { type = "RUN", command = "apt-get install -y python3-pip netcat-openbsd libgl1 libgomp1 libusb-1.0-0" },
    { type = "COPY", source = "requirements.txt", target = "requirements.txt" },
    { type = "RUN", command = "pip3 install -r /app/requirements.txt --break-system-packages" },
]

prepare_build_container = []

build_steps = []

# Runtime config is read from env vars by main.py. Push them with
#   oakctl app config set <app-id> --env KEY=VALUE [--restart]
# Variables:
#   BACKEND_URL            (e.g. https://api.realityproof.app)
#   CAMERA_SHARED_SECRET   (preferred; pairs with backend's CAMERA_SHARED_SECRET)
#   IOS_SHARED_SECRET      (legacy fallback)
#   GOTEE_HOST/GOTEE_PORT  (default 10.0.0.1:4000 — overridden below to OAK's
#                           main LAN IP so the container reaches the host-side
#                           TCP forwarder which proxies to the Armory bridge)
#   DEVICE_BUNDLE_ID       (default io.luxonis.scan-and-sign)
#   BEE_URL                (Bee node for direct scene upload, e.g.
#                           http://89.116.31.10:1633 — required for cloud-mode
#                           scenes >4MB to actually be pinned)
#   SWARM_POSTAGE_BATCH_ID (Bee postage batch ID — pairs with BEE_URL)
#   PINATA_JWT             (alternative IPFS path; takes precedence over Bee)
entrypoint = [
    "bash", "-c",
    "python3 -u /app/main.py --gotee-host $(hostname -I | awk '{print $1}')",
]
